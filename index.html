<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neom Tropical | Sinta a Energia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">NEOM <span>TROPICAL</span></div>
        <nav>
            <ul>
                <li><a href="#">Sabores</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="item active" style="--background: #0b2956">
            <h1 class="title">Guaraná <br>Tropical</h1>
            <img src="img/fundo1.png" class="fruit" alt="Frutas Fundo">
            <img src="img/img1.png" class="refri" alt="Lata Neom">
            <button class="buy-btn">Experimentar</button>
        </div>

        <div class="item" style="--background: #5dcad1">
            <h1 class="title">Maracujá <br>Refrescante</h1>
            <img src="img/fundo2.png" class="fruit" alt="Frutas Fundo">
            <img src="img/img2.png" class="refri" alt="Lata Neom">
            <button class="buy-btn">Experimentar</button>
        </div>

        <div class="item" style="--background: #ac1f22">
            <h1 class="title">Frutas <br>Cítricas</h1>
            <img src="img/fundo3.png" class="fruit" alt="Frutas Fundo">
            <img src="img/img3.png" class="refri" alt="Lata Neom">
            <button class="buy-btn">Experimentar</button>
        </div>

        <div class="item" style="--background: #432351">
            <h1 class="title">Frutas <br>Vermelhas</h1>
            <img src="img/fundo4.png" class="fruit" alt="Frutas Fundo">
            <img src="img/img4.png" class="refri" alt="Lata Neom">
            <button class="buy-btn">Experimentar</button>
        </div>

        <button id="prev" class="nav-btn">&lt;</button>
        <button id="next" class="nav-btn">&gt;</button>

        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </main>

    
    <script src="scripts.js"></script>
</body>
</html>
